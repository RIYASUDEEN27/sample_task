services:
  # ── Backend (Flask API) ─────────────────────────────────────────
  - type: web
    name: sample-task-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard

  # ── Frontend (React / Vite Static Site) ────────────────────────
  - type: web
    name: sample-task-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sample-task-backend.onrender.com/api
